name: Release

on:
  push:
    tags:
      - 'v*'
      - '!testing_v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Prepare Environment
        uses: ./.github/actions/prepare-environment

      - name: Compute Version
        id: ver
        shell: pwsh
        run: |
          $ver = '${{ github.ref_name }}' -replace '^v'
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build
        uses: ./.github/actions/build-skintattoo
        with:
          configuration: Release
          version: ${{ steps.ver.outputs.version }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SkinTattoo ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: SkinTattoo.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update repo manifests
        shell: pwsh
        run: |
          $ver = '${{ steps.ver.outputs.version }}'
          $tag = '${{ github.ref_name }}'
          foreach ($path in @('./repo.json', './repo.cn.json')) {
            if (-not (Test-Path $path)) { continue }
            $json = Get-Content -Raw $path | ConvertFrom-Json
            $json[0].AssemblyVersion = $ver
            $json[0].TestingAssemblyVersion = $ver
            $json[0].DownloadLinkInstall = $json[0].DownloadLinkInstall -replace '[^/]+/SkinTattoo.zip', "$tag/SkinTattoo.zip"
            $json[0].DownloadLinkTesting = $json[0].DownloadLinkTesting -replace '[^/]+/SkinTattoo.zip', "$tag/SkinTattoo.zip"
            $json[0].DownloadLinkUpdate = $json[0].DownloadLinkUpdate -replace '[^/]+/SkinTattoo.zip', "$tag/SkinTattoo.zip"
            $json | ConvertTo-Json -AsArray | Set-Content -Path $path
          }

      - name: Commit repo manifests
        shell: pwsh
        run: |
          git config --global user.name "Actions User"
          git config --global user.email "actions@github.com"
          git fetch origin repo || $true
          git branch -f repo ${{ github.sha }}
          git checkout repo
          git add repo.json repo.cn.json
          git commit -m "[CI] Update repo manifests for ${{ github.ref_name }}" || $true
          git push --force-with-lease origin repo
