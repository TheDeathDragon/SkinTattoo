name: 'Prepare Environment'
description: 'Set up .NET, restore dependencies, and download the Dalamud development distribution.'
inputs:
  dalamud-distrib:
    description: 'Sub-path under goatcorp.github.io/dalamud-distrib/ (must end in a /, or empty for latest).'
    required: false
    default: 'stg/'

runs:
  using: 'composite'
  steps:
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.x.x
        cache: true
        cache-dependency-path: ./SkinTattoo/SkinTattoo/packages.lock.json

    - name: Restore dependencies
      shell: pwsh
      run: dotnet restore

    - name: Download Dalamud
      shell: pwsh
      run: |
        Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/${{ inputs.dalamud-distrib }}latest.zip -OutFile latest.zip
        Expand-Archive -Force latest.zip "$env:AppData\XIVLauncherCN\addon\Hooks\dev"
